server {
    server_name okemily.com www.okemily.com;

    root /var/www/okemily;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # IDUNA API proxy (added 2026-07-18) — same-origin path for the
    # mailing-list signup form, so the browser never has to make a
    # cross-origin request to iduna.farthq.com (which has no HTTPS cert as
    # of this writing — see EMILY docs/hq-specs/HQ-SPEC-INFRA-105 S151-04).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # IDUNA admin login (added 2026-07-19) — same-origin proxy so
    # /admin/login works over okemily.com's real HTTPS cert without
    # depending on iduna.farthq.com's cert (still pending) or its
    # WordPress/EDIS root-path collision (unresolved, see
    # EMILY/docs/fable-prompts/iduna-front-door-funnel.md). Admin auth is
    # cookie-based (RequireCookieAuth) — proxying same-origin keeps that
    # simple; no cross-origin cookie handling needed.
    location /admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FatBaby newssite (updated 2026-07-18) — moved to its own subdomain
    # (news.okemily.com) since newssite generates root-relative links
    # (/tickers, /section/...) with no base-path config option; those broke
    # under this subpath proxy (ticker sub-pages 404'd). Redirect instead
    # of proxying here.
    location /news/ {
        rewrite ^/news/(.*)$ https://news.okemily.com/$1 permanent;
    }
    location = /news {
        return 301 https://news.okemily.com/;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/okemily.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/okemily.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot



    add_header Strict-Transport-Security "max-age=31536000" always; # managed by Certbot

}
server {
    if ($host = www.okemily.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


