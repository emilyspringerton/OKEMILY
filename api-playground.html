<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Playground &mdash; EINHORN_INDUSTRIAL</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<style>
  body { margin: 0; background: #fafafa; }
  .topbar { display: none !important; } /* Swagger UI's own header, replaced by ours below */
  .our-header {
    padding: 1rem 2rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    border-bottom: 1px solid #e4e4e8; background: #fff;
  }
  .our-header a { color: #4451c7; text-decoration: none; font-weight: 600; }
  .our-header p { color: #4a4f5c; font-size: 0.9rem; margin: 0.4rem 0 0; }
</style>
</head>
<body>
<div class="our-header">
  <a href="/">&larr; EINHORN_INDUSTRIAL</a>
  <p>Live API playground for IDUNA, the FARTHQ trust authority. The underlying spec is a known
  work in progress &mdash; some newer endpoints (e.g. the blog and mailing-list APIs used on this
  very site) may not be reflected here yet.</p>
</div>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
<script>
  window.onload = function() {
    SwaggerUIBundle({
      url: '/api/v1/openapi.json',
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis],
      layout: 'BaseLayout',
    });
  };
</script>
</body>
</html>
