server {
    listen 80;
    listen [::]:80;
    server_name okemily.com www.okemily.com;

    root /var/www/okemily;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # IDUNA API proxy (added 2026-07-18) — same-origin path for the
    # mailing-list signup form, so the browser never has to make a
    # cross-origin request to iduna.farthq.com (which has no HTTPS cert as
    # of this writing — see EMILY docs/hq-specs/HQ-SPEC-INFRA-105 S151-04).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FatBaby newssite proxy (added 2026-07-18) — same-origin, reuses this
    # domain's existing cert rather than needing a new subdomain/cert for
    # newssite. newssite's own asset/link URLs still reference its bare
    # :8082 origin in a few places (pre-existing, not fixed by this proxy
    # alone) — flagged as a follow-up, not blocking.
    location /news/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
